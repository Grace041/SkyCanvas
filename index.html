<html>
<head>
    <title>Sky Canvas</title>
    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #dfe7ff;
        }

        .render-view {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        canvas {
            display: block;
        }

        .formation-controls {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 240px;
            padding: 14px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 8px;
            background: rgba(7, 20, 47, 0.76);
            box-shadow: 0 16px 42px rgba(0, 0, 0, 0.32);
            backdrop-filter: blur(12px);
            color: white;
            font-size: 14px;
            font-family: Arial, sans-serif;
        }

        .control-label {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .formation-select {
            padding: 8px 12px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 8px;
            background: rgba(7, 20, 47, 0.85);
            color: white;
            font-size: 14px;
        }

        .rotation-speed {
            width: 140px;
            accent-color: white;
        }

        .shape-drone-count {
            width: 100%;
            accent-color: white;
        }

        .drone-color {
            width: 140px;
            height: 34px;
            padding: 2px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 8px;
            background: rgba(7, 20, 47, 0.85);
        }

        .shape-builder {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-top: 2px;
        }

        .shape-canvas {
            width: 100%;
            height: 160px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.08);
            cursor: crosshair;
            touch-action: none;
        }

        .shape-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .shape-button {
            min-height: 34px;
            border: 1px solid rgba(255, 255, 255, 0.36);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.12);
            color: white;
            font: inherit;
            cursor: pointer;
        }

        .shape-button:hover {
            background: rgba(255, 255, 255, 0.2);
        }

    </style>
</head>

<body>
<div class="render-view">
    <div class="formation-controls">
        <label class="control-label">
            Formation
            <select id="formation-select" class="formation-select">
                <option value="idle">Idle</option>
                <option value="heart">Heart</option>
                <option value="planet">Planet</option>
                <option value="custom">Custom Shape</option>
            </select>
        </label>
        <label class="control-label">
            Rotation Speed
            <input id="rotation-speed" class="rotation-speed" type="range" min="0" max="2" step="0.1" value="0.5">
        </label>
        <label class="control-label">
            Drone Colour
            <input id="drone-color" class="drone-color" type="color" value="#ffffff">
        </label>
        <div class="shape-builder">
            <label class="control-label">
                Draw Custom Shape
                <canvas id="shape-canvas" class="shape-canvas" width="440" height="320"></canvas>
            </label>
            <label class="control-label">
                Drones in Shape: <span id="shape-drone-count-value">160</span>
                <input id="shape-drone-count" class="shape-drone-count" type="range" min="24" max="320" step="8" value="160">
            </label>
            <div class="shape-actions">
                <button id="apply-shape" class="shape-button" type="button">Use Shape</button>
                <button id="clear-shape" class="shape-button" type="button">Clear</button>
            </div>
        </div>
    </div>
</div>
<script type="module" src="main.js"></script>
</body>
</html>
