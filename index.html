<html>
<head>
    <title>Sky Canvas</title>
    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #dfe7ff;
        }

        .render-view {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        canvas {
            display: block;
        }

        .shape-controls {
            position: absolute;
            z-index: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 240px;
            padding: 14px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 8px;
            background: rgba(7, 20, 47, 0.76);
            box-shadow: 0 16px 42px rgba(0, 0, 0, 0.32);
            backdrop-filter: blur(12px);
            color: white;
            font-size: 14px;
            font-family: Arial, sans-serif;
        }

        .shape-controls[hidden] {
            display: none;
        }

        .shape-title {
            margin: 0;
            font-size: 14px;
            font-weight: 700;
        }

        .control-label {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .shape-builder {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-top: 2px;
        }

        .shape-canvas {
            width: 100%;
            height: 160px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.08);
            cursor: crosshair;
            touch-action: none;
        }

        .shape-drone-count {
            width: 100%;
            accent-color: white;
        }

        .shape-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .shape-button {
            min-height: 34px;
            border: 1px solid rgba(255, 255, 255, 0.36);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.12);
            color: white;
            font: inherit;
            cursor: pointer;
        }

        .shape-button:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .lil-gui {
            border-radius: 15px;
            padding: 10px;
        }

    </style>
</head>

<body>
<div class="render-view">
    <div id="shape-controls" class="shape-controls" hidden>
        <h1 class="shape-title">Draw Custom Shape</h1>
        <div class="shape-builder">
            <label class="control-label">
                <canvas id="shape-canvas" class="shape-canvas" width="440" height="320"></canvas>
            </label>
            <div>Drones in Shape: <span id="shape-drone-count-value">160</span></div>
            <input id="shape-drone-count" class="shape-drone-count" type="range" min="24" max="320" step="8" value="160">
            <div class="shape-actions">
                <button id="apply-shape" class="shape-button" type="button">Use Shape</button>
                <button id="clear-shape" class="shape-button" type="button">Clear</button>
            </div>
        </div>
    </div>
</div>
<script type="module" src="main.js"></script>
</body>
</html>
